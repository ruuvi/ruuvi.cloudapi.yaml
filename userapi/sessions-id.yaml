delete:
  summary: Delete a session
  description: Deletes a single active session by ID.
  operationId: deleteSession
  tags:
    - Sessions
  security:
    - bearerAuth: []

  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID of the session to delete.
      example: 984231

  responses:
    '200':
      description: Session deleted successfully
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/Success.yaml'
              - type: object
                properties:
                  data:
                    type: object
                    additionalProperties: false
          examples:
            success:
              value:
                result: success
                data: {}

    '401':
      description: UNAUTHORIZED - Auth token missing or invalid
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
          examples:
            unauthorized:
              value:
                result: "error"
                error: "UNAUTHORIZED"
                code: "ER_UNAUTHORIZED"

    '404':
      description: NOT FOUND - Session does not exist
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Error.yaml'
          examples:
            not_found:
              value:
                result: "error"
                error: "NOT FOUND"
                code: "ER_NOT_FOUND"
